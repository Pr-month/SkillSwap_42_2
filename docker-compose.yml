services:
  postgres:
    image: postgres:18-alpine
    container_name: skillswap-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '${DATABASE_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - skillswap-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: skillswap-backend
    build:
      context: backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      HASH_SALT: ${HASH_SALT}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_PATH: ${UPLOAD_PATH}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - '${PORT}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skillswap-network

  seeder:
    build:
      context: ./backend
      target: builder
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-skillswap}
    entrypoint: ['npm', 'run', 'seed:all']
    networks:
      - skillswap-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  nginx:
    container_name: skillswap-nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        - VITE_SKILLSWAP_API_URL=${VITE_SKILLSWAP_API_URL}
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - skillswap-network

volumes:
  pgdata:

networks:
  skillswap-network:
    driver: bridge
